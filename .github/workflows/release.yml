name: Publish package

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish or retry
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - name: Verify release tag
        run: npm run release:check -- "$RELEASE_TAG"
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser
      - name: Create package
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts
      - name: Ensure GitHub Release exists
        run: gh release view "$RELEASE_TAG" || gh release create "$RELEASE_TAG" --verify-tag --title "$RELEASE_TAG" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Attach package
        run: gh release upload "$RELEASE_TAG" artifacts/*.tgz --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Check published version
        id: registry
        shell: bash
        run: |
          package_name="$(node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; process.stdout.write(pkg.name)")"
          package_version="$(node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; process.stdout.write(pkg.version)")"
          if npm view "$package_name@$package_version" version --json >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish the attached package to npm
        if: steps.registry.outputs.published != 'true'
        run: npm publish ./artifacts/*.tgz
        env:
          # Needed only to bootstrap the first publish. Once npm trusted
          # publishing is configured for release.yml, remove this secret.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
