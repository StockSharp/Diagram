name: Attach package to release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Create package
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts
      - name: Attach package
        run: gh release upload "${{ github.event.release.tag_name }}" artifacts/*.tgz --clobber
        env:
          GH_TOKEN: ${{ github.token }}
