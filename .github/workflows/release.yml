name: Publish package

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - name: Verify release tag
        run: npm run release:check -- "${{ github.event.release.tag_name }}"
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser
      - name: Create package
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts
      - name: Attach package
        run: gh release upload "${{ github.event.release.tag_name }}" artifacts/*.tgz --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Publish the attached package to npm
        run: npm publish artifacts/*.tgz
        env:
          # Needed only to bootstrap the first publish. Once npm trusted
          # publishing is configured for release.yml, remove this secret.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
